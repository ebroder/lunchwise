name = "lunchwise"
main = "src/index.tsx"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

[observability.traces]
enabled = true

[assets]
directory = "./dist/client"

[triggers]
crons = ["0 */2 * * *"]

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 30
  period = 60

[[routes]]
pattern = "lunchwise.app"
custom_domain = true
